name: Publish Core24 Variants
on:
  schedule:
    - cron: '0 2 * * *'
  push:
    paths:
      - 'core24/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        variant: [all, snap, flatpak]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Github Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core24 ${{ matrix.variant }} ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core24/${{ matrix.variant }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha
          pull: true
          push: true
          tags: ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }}-${{ matrix.arch }}
          provenance: false
          sbom: false
          cgroup-parent: system.slice

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        variant: [all, snap, flatpak]
    steps:
      - name: Login to Github Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Create and push multi-arch manifest for core24:${{ matrix.variant }}
        id: build
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }} \
            ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }}-amd64 \
            ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }}-arm64

          # Get the digest of the multi-arch manifest we just created
          DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }} | grep "^Digest:" | awk '{print $2}')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Manifest digest: ${DIGEST}"
      - name: Sign the image with keyless signing
        run: |
          # Sign using digest (immutable reference) to avoid tag mutation warning
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/core24@${{ steps.build.outputs.digest }}

  mirror-to-quay:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        variant: [all, snap, flatpak]
    steps:
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Mirror multi-arch manifest to Quay.io
        id: mirror
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          skopeo copy --all \
            --src-creds "${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "$QUAY_USERNAME:$QUAY_PASSWORD" \
            docker://ghcr.io/sirf-project/releases/core24:${{ matrix.variant }} \
            docker://quay.io/sirf-project/releases/core24:${{ matrix.variant }}

          # Get the digest of the mirrored image
          DIGEST=$(skopeo inspect docker://quay.io/sirf-project/releases/core24:${{ matrix.variant }} | jq -r '.Digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Mirror digest: ${DIGEST}"
      - name: Sign the Quay.io mirror
        run: |
          # Sign using digest (immutable reference) to avoid tag mutation warning
          cosign sign --yes \
            quay.io/sirf-project/releases/core24@${{ steps.mirror.outputs.digest }}
