name: Publish Core24 Variants
on:
  schedule:
    - cron: '0 2 * * *'
  push:
    paths:
      - 'core24/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        variant: [all, snap, flatpak]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Github Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core24 ${{ matrix.variant }} ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core24/${{ matrix.variant }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha
          pull: true
          push: true
          tags: ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }}-${{ matrix.arch }}
          provenance: false
          sbom: false
          cgroup-parent: system.slice

  release:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [all, snap, flatpak]
    steps:
      - name: Login to Github Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest for core24:${{ matrix.variant }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }} \
            ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }}-amd64 \
            ghcr.io/${{ github.repository }}/core24:${{ matrix.variant }}-arm64
