---
  name: Release Stable Images
  on:
    schedule:
      - cron: '0 0 * * 0'  # Weekly on Sundays at midnight
    push:
      paths:
        - 'stable/**'
      branches:
        - main
    workflow_dispatch:

  jobs:
    build-apt-amd64:
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push apt amd64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/apt
            platforms: linux/amd64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-apt-amd64
            provenance: false
            sbom: false
            cgroup-parent: system.slice

    build-apt-arm64:
      runs-on: ubuntu-24.04-arm
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push apt arm64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/apt
            platforms: linux/arm64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-apt-arm64
            provenance: false
            sbom: false
            cgroup-parent: system.slice

    build-snap-amd64:
      runs-on: ubuntu-24.04
      needs: build-apt-amd64
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push snap amd64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/snap
            platforms: linux/amd64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-snap-amd64
            provenance: false
            sbom: false
            cgroup-parent: system.slice
    
    build-snap-arm64:
      runs-on: ubuntu-24.04-arm
      needs: build-apt-arm64
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push snap arm64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/snap
            platforms: linux/arm64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-snap-arm64
            provenance: false
            sbom: false
            cgroup-parent: system.slice
    
    build-flatpak-amd64:
      runs-on: ubuntu-24.04
      needs: build-apt-amd64
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push flatpak amd64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/flatpak
            platforms: linux/amd64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-flatpak-amd64
            provenance: false
            sbom: false
            cgroup-parent: system.slice

    build-flatpak-arm64:
      runs-on: ubuntu-24.04-arm
      needs: build-apt-arm64
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push flatpak arm64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/flatpak
            platforms: linux/arm64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-flatpak-arm64
            provenance: false
            sbom: false
            cgroup-parent: system.slice
    
    build-all-amd64:
      runs-on: ubuntu-24.04
      needs: build-apt-amd64
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push all-in-one amd64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/all
            platforms: linux/amd64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-all-amd64
            provenance: false
            sbom: false
            cgroup-parent: system.slice

    build-all-arm64:
      runs-on: ubuntu-24.04-arm
      needs: build-apt-arm64
      steps:
        - uses: actions/checkout@v4
        - uses: docker/setup-buildx-action@v3
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build and push all-in-one arm64
          uses: docker/build-push-action@v6
          with:
            context: .
            file: stable/all
            platforms: linux/arm64
            cache-from: type=gha
            cache-to: type=gha
            pull: true
            push: true
            tags: ghcr.io/${{ github.repository }}:stable-all-arm64
            provenance: false
            sbom: false
            cgroup-parent: system.slice

    release-stable:
      needs:
        - build-apt-amd64
        - build-apt-arm64
        - build-snap-amd64
        - build-snap-arm64
        - build-flatpak-amd64
        - build-flatpak-arm64
        - build-all-amd64
        - build-all-arm64
      runs-on: ubuntu-24.04
      strategy:
        matrix:
          variant: [apt, snap, flatpak, all]
      steps:
        - name: Login to Github Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Create and push multi-arch manifest for ${{ matrix.variant }}
          run: |
            docker buildx imagetools create \
              --tag ghcr.io/${{ github.repository }}:stable-${{ matrix.variant }} \
              ghcr.io/${{ github.repository }}:stable-${{ matrix.variant }}-amd64 \
              ghcr.io/${{ github.repository }}:stable-${{ matrix.variant }}-arm64
